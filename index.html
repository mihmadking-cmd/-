<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>محرر الصور - ضع نفسك في الملعب</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🏟️ محرر الصور - ملعب الأحلام</h1>
            <p>ضع صورتك في ملعب يهتف مع الجمهور!</p>
        </header>

        <div class="main-content">
            <!-- قسم الإدخال -->
            <div class="upload-section">
                <div class="upload-area" id="uploadArea">
                    <div class="upload-icon">📸</div>
                    <h3>اسحب الصورة هنا</h3>
                    <p>أو انقر لاختيار صورة من جهازك</p>
                    <input type="file" id="imageInput" accept="image/*" hidden>
                </div>
            </div>

            <!-- قسم الخيارات -->
            <div class="options-section">
                <h3>خيارات التحرير:</h3>
                
                <div class="option-group">
                    <label for="stadium">نوع الملعب:</label>
                    <select id="stadium">
                        <option value="soccer">ملعب كرة القدم 🏟️</option>
                        <option value="basketball">ملعب كرة السلة 🏀</option>
                        <option value="cricket">ملعب الكريكيت 🏏</option>
                        <option value="concert">حفل موسيقي 🎤</option>
                    </select>
                </div>

                <div class="option-group">
                    <label for="crowd">كثافة الجمهور:</label>
                    <input type="range" id="crowd" min="1" max="5" value="3">
                    <span id="crowdValue">عالية</span>
                </div>

                <div class="option-group">
                    <label for="position">موضع الشخص:</label>
                    <select id="position">
                        <option value="center">الوسط (الاحتفالات) 🎉</option>
                        <option value="left">اليسار</option>
                        <option value="right">اليمين</option>
                        <option value="top">الأعلى</option>
                    </select>
                </div>

                <div class="option-group">
                    <label for="brightness">السطوع:</label>
                    <input type="range" id="brightness" min="50" max="150" value="100">
                    <span id="brightnessValue">100%</span>
                </div>

                <div class="option-group">
                    <label for="cheering">مستوى الهتاف:</label>
                    <input type="range" id="cheering" min="1" max="5" value="3">
                    <span id="cheeringValue">عالي</span>
                </div>
            </div>

            <!-- قسم المعاينة -->
            <div class="preview-section">
                <h3>المعاينة:</h3>
                <canvas id="previewCanvas" width="600" height="500"></canvas>
            </div>

            <!-- أزرار التحكم -->
            <div class="button-group">
                <button id="processBtn" class="btn btn-primary">🎬 معالجة الصورة</button>
                <button id="downloadBtn" class="btn btn-success" disabled>⬇️ تحميل الصورة</button>
                <button id="resetBtn" class="btn btn-secondary">🔄 إعادة تعيين</button>
            </div>
        </div>

        <footer>
            <p>© 2026 محرر الصور - صُنع بـ ❤️</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
