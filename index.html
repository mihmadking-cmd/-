<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>تعديل الصور - محرر صور احترافي</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🖼️ تعديل الصور</h1>
            <p>أداة احترافية لتعديل الصور بكل سهولة</p>
        </header>
        
        <main>
            <section class="upload-section">
                <h2>رفع صورة</h2>
                <div class="upload-area">
                    <input type="file" id="imageInput" accept="image/*" />
                    <label for="imageInput">اختر صورة أو اسحبها هنا</label>
                </div>
            </section>

            <section class="editor-section" id="editorSection" style="display: none;">
                <h2>محرر الصور</h2>
                <div class="editor-container">
                    <canvas id="canvas"></canvas>
                </div>
                
                <div class="controls">
                    <div class="control-group">
                        <label for="brightnessSlider">السطوع</label>
                        <input type="range" id="brightnessSlider" min="0" max="200" value="100">
                        <span id="brightnessValue">100%</span>
                    </div>
                    
                    <div class="control-group">
                        <label for="contrastSlider">التباين</label>
                        <input type="range" id="contrastSlider" min="0" max="200" value="100">
                        <span id="contrastValue">100%</span>
                    </div>
                    
                    <div class="control-group">
                        <label for="saturationSlider">التشبع</label>
                        <input type="range" id="saturationSlider" min="0" max="200" value="100">
                        <span id="saturationValue">100%</span>
                    </div>
                    
                    <div class="button-group">
                        <button id="resetBtn" class="btn btn-secondary">إعادة تعيين</button>
                        <button id="downloadBtn" class="btn btn-primary">تحميل الصورة</button>
                    </div>
                </div>
            </section>

            <footer>
                <p>© 2026 - تعديل الصور | جميع الحقوق محفوظة</p>
            </footer>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
